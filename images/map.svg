<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#061525"/>
      <stop offset="50%" style="stop-color:#0a2540"/>
      <stop offset="100%" style="stop-color:#0d3a5c"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a4a6a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect fill="url(#mapGrad)" width="800" height="500"/>
  <rect fill="url(#grid)" width="800" height="500"/>
  
  <!-- 模拟养殖区块 -->
  <rect x="100" y="80" width="120" height="80" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="250" y="100" width="100" height="70" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="380" y="120" width="140" height="90" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="550" y="80" width="110" height="100" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  
  <rect x="120" y="200" width="150" height="100" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="300" y="220" width="130" height="80" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="460" y="200" width="160" height="110" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  
  <rect x="150" y="340" width="180" height="90" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="360" y="350" width="140" height="80" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <rect x="530" y="330" width="120" height="100" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  
  <!-- 标记点 -->
  <circle cx="160" cy="120" r="6" fill="#00ff88"/>
  <circle cx="300" cy="135" r="6" fill="#00d4ff"/>
  <circle cx="450" cy="165" r="6" fill="#ffcc00"/>
  <circle cx="600" cy="130" r="6" fill="#00d4ff"/>
  <circle cx="195" cy="250" r="6" fill="#ff8800"/>
  <circle cx="365" cy="260" r="6" fill="#00d4ff"/>
  <circle cx="540" cy="255" r="6" fill="#00ff88"/>
  
  <text x="400" y="250" font-family="Arial" font-size="16" fill="#5a9cbc" text-anchor="middle">园区地图</text>
  <text x="400" y="275" font-family="Arial" font-size="12" fill="#3a7c9c" text-anchor="middle">点击上传自定义地图</text>
</svg>
